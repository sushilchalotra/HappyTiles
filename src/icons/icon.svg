<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="HappyTiles icon">
  <!-- Full-bleed background so the icon also works as a maskable icon -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8a5cf6"/>
      <stop offset="1" stop-color="#21d4c4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Safe zone art (centered, within maskable safe area) -->
  <g transform="translate(96 96)">
    <rect x="0"   y="0"   width="140" height="140" rx="28" fill="#ff5fa2"/>
    <rect x="180" y="0"   width="140" height="140" rx="28" fill="#ffd23f"/>
    <rect x="0"   y="180" width="140" height="140" rx="28" fill="#ffffff"/>
    <rect x="180" y="180" width="140" height="140" rx="28" fill="#ff8a3d"/>
    <!-- a friendly star on the white tile -->
    <polygon points="70,210 84,250 126,250 92,276 104,316 70,292 36,316 48,276 14,250 56,250"
             fill="#8a5cf6"/>
    <circle cx="250" cy="70" r="34" fill="#ffffff"/>
    <circle cx="250" cy="250" r="30" fill="#ffffff"/>
  </g>
</svg>
